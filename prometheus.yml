# ═════════════════════════════════════════════════════════════════════════════
# prometheus.yml — Prometheus Configuration for DropKey v3.2
#
# Scrape configurations for:
#   • Application metrics
#   • Database metrics
#   • Redis metrics
#   • Node exporter metrics
# ═════════════════════════════════════════════════════════════════════════════

global:
  scrape_interval: 15s        # Scrape every 15 seconds
  evaluation_interval: 15s    # Evaluate rules every 15 seconds
  external_labels:
    cluster: 'dropkey-prod'
    environment: 'production'

# Alert manager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - 'alertmanager:9093'

# Alert rules
rule_files:
  - '/etc/prometheus/rules/*.yml'

# Scrape configurations
scrape_configs:
  # ═════════════════════════════════════════════════════════════════════════
  # Prometheus self-monitoring
  # ═════════════════════════════════════════════════════════════════════════
  
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # ═════════════════════════════════════════════════════════════════════════
  # DropKey Application
  # ═════════════════════════════════════════════════════════════════════════
  
  - job_name: 'dropkey'
    scrape_interval: 10s
    scrape_timeout: 5s
    metrics_path: '/metrics'
    scheme: http
    
    # Service discovery (docker-compose)
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        port: 8000
    
    # Or use static targets
    static_configs:
      - targets:
          - 'dropkey:8000'
        labels:
          instance: 'app-primary'
          service: 'dropkey'
    
    # Relabel configurations
    relabel_configs:
      - source_labels: [__scheme__, __address__, __metrics_path__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: localhost:8000

  # ═════════════════════════════════════════════════════════════════════════
  # PostgreSQL Exporter
  # ═════════════════════════════════════════════════════════════════════════
  
  - job_name: 'postgres'
    scrape_interval: 30s
    scrape_timeout: 10s
    metrics_path: '/metrics'
    scheme: http
    
    static_configs:
      - targets:
          - 'postgres-exporter:9187'
        labels:
          instance: 'postgres-primary'
          database: 'dropkey'

  # ═════════════════════════════════════════════════════════════════════════
  # Redis Exporter
  # ═════════════════════════════════════════════════════════════════════════
  
  - job_name: 'redis'
    scrape_interval: 30s
    scrape_timeout: 10s
    metrics_path: '/metrics'
    scheme: http
    
    static_configs:
      - targets:
          - 'redis-exporter:9121'
        labels:
          instance: 'redis-primary'

  # ═════════════════════════════════════════════════════════════════════════
  # Node Exporter (Host Metrics)
  # ═════════════════════════════════════════════════════════════════════════
  
  - job_name: 'node'
    scrape_interval: 30s
    scrape_timeout: 10s
    metrics_path: '/metrics'
    scheme: http
    
    static_configs:
      - targets:
          - 'node-exporter:9100'
        labels:
          instance: 'localhost'
          hostname: 'prod-server-1'

  # ═════════════════════════════════════════════════════════════════════════
  # Docker Metrics (cAdvisor)
  # ═════════════════════════════════════════════════════════════════════════
  
  - job_name: 'docker'
    scrape_interval: 30s
    scrape_timeout: 10s
    metrics_path: '/metrics'
    scheme: http
    
    static_configs:
      - targets:
          - 'cadvisor:8080'
        labels:
          instance: 'docker-host'

  # ═════════════════════════════════════════════════════════════════════════
  # Kubernetes Metrics (if using K8s)
  # ═════════════════════════════════════════════════════════════════════════
  
  - job_name: 'kubernetes-apiservers'
    kubernetes_sd_configs:
      - role: endpoints
    scheme: https
    tls_config:
      ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
    bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
    relabel_configs:
      - source_labels: [__meta_kubernetes_namespace, __meta_kubernetes_service_name, __meta_kubernetes_endpoint_port_name]
        action: keep
        regex: default;kubernetes;https

  - job_name: 'kubernetes-nodes'
    kubernetes_sd_configs:
      - role: node
    scheme: https
    tls_config:
      ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
    bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
    relabel_configs:
      - action: labelmap
        regex: __meta_kubernetes_node_label_(.+)
      - target_label: __address__
        replacement: kubernetes.default.svc:443
      - source_labels: [__meta_kubernetes_node_name]
        regex: (.+)
        target_label: __metrics_path__
        replacement: /api/v1/nodes/${1}/proxy/metrics

  - job_name: 'kubernetes-pods'
    kubernetes_sd_configs:
      - role: pod
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
        action: keep
        regex: "true"
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
        action: replace
        target_label: __metrics_path__
        regex: (.+)
      - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
        action: replace
        regex: ([^:]+)(?::\d+)?;(\d+)
        replacement: $1:$2
        target_label: __address__
      - action: labelmap
        regex: __meta_kubernetes_pod_label_(.+)
      - source_labels: [__meta_kubernetes_namespace]
        action: replace
        target_label: kubernetes_namespace
      - source_labels: [__meta_kubernetes_pod_name]
        action: replace
        target_label: kubernetes_pod_name
