---
# ═════════════════════════════════════════════════════════════════════════════
# Kubernetes Manifests — DropKey v3.2 Production Setup
#
# Deploy: kubectl apply -f k8s/
# ═════════════════════════════════════════════════════════════════════════════

# Namespace
---
apiVersion: v1
kind: Namespace
metadata:
  name: dropkey
  labels:
    name: dropkey

# ServiceAccount
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: dropkey
  namespace: dropkey

# ConfigMap - Application Configuration
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: dropkey-config
  namespace: dropkey
data:
  DROPKEY_ENVIRONMENT: "production"
  DROPKEY_LOG_LEVEL: "INFO"
  DROPKEY_CORS_ENABLED: "true"
  DROPKEY_CORS_ORIGINS: "https://dropkey.io"
  DROPKEY_RATE_LIMITING_ENABLED: "true"
  DROPKEY_RATE_LIMITING_RPM: "100"

# Secret - Sensitive Data
---
apiVersion: v1
kind: Secret
metadata:
  name: dropkey-secrets
  namespace: dropkey
type: Opaque
stringData:
  DATABASE_URL: postgresql+asyncpg://dropkey:PASSWORD@postgres:5432/dropkey
  JWT_SECRET_KEY: your-32-character-secret-key-here
  API_KEY: your-api-key-here

# PersistentVolumeClaim
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: dropkey-logs-pvc
  namespace: dropkey
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: standard
  resources:
    requests:
      storage: 10Gi

# Deployment
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dropkey
  namespace: dropkey
  labels:
    app: dropkey
    version: "3.2.0"
spec:
  replicas: 3
  selector:
    matchLabels:
      app: dropkey
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: dropkey
        version: "3.2.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: dropkey
      securityContext:
        fsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
      
      initContainers:
      - name: migrate-db
        image: registry.example.com/dropkey:3.2.0
        command: ["alembic", "upgrade", "head"]
        env:
        - name: DROPKEY_DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: dropkey-secrets
              key: DATABASE_URL
      
      containers:
      - name: dropkey
        image: registry.example.com/dropkey:3.2.0
        imagePullPolicy: Always
        
        ports:
        - name: http
          containerPort: 8000
          protocol: TCP
        
        envFrom:
        - configMapRef:
            name: dropkey-config
        
        env:
        - name: DROPKEY_DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: dropkey-secrets
              key: DATABASE_URL
        - name: DROPKEY_JWT_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: dropkey-secrets
              key: JWT_SECRET_KEY
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        
        resources:
          limits:
            memory: "512Mi"
            cpu: "1000m"
            ephemeral-storage: "1Gi"
          requests:
            memory: "256Mi"
            cpu: "500m"
            ephemeral-storage: "100Mi"
        
        livenessProbe:
          httpGet:
            path: /health/live
            port: http
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 3
          failureThreshold: 3
        
        readinessProbe:
          httpGet:
            path: /health/ready
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        
        startupProbe:
          httpGet:
            path: /health/live
            port: http
          failureThreshold: 30
          periodSeconds: 10
        
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 1000
          capabilities:
            drop:
              - ALL
            add:
              - NET_BIND_SERVICE
        
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: logs
          mountPath: /app/logs
        - name: cache
          mountPath: /app/.cache
      
      volumes:
      - name: tmp
        emptyDir: {}
      - name: logs
        persistentVolumeClaim:
          claimName: dropkey-logs-pvc
      - name: cache
        emptyDir:
          medium: Memory
          sizeLimit: 100Mi
      
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - dropkey
              topologyKey: kubernetes.io/hostname
        
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: kubernetes.io/os
                operator: In
                values:
                - linux

# Service
---
apiVersion: v1
kind: Service
metadata:
  name: dropkey
  namespace: dropkey
  labels:
    app: dropkey
spec:
  type: LoadBalancer
  selector:
    app: dropkey
  ports:
  - port: 80
    targetPort: http
    protocol: TCP
    name: http
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800

# HorizontalPodAutoscaler
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: dropkey-hpa
  namespace: dropkey
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: dropkey
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 15
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 15

# NetworkPolicy
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: dropkey-netpol
  namespace: dropkey
spec:
  podSelector:
    matchLabels:
      app: dropkey
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: ingress-controller
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
  egress:
  - to:
    - podSelector:
        matchLabels:
          app: postgres
    ports:
    - protocol: TCP
      port: 5432
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 53
    - protocol: UDP
      port: 53

# PodDisruptionBudget
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: dropkey-pdb
  namespace: dropkey
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: dropkey

# Ingress
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dropkey-ingress
  namespace: dropkey
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/rate-limit: "100"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - dropkey.io
    secretName: dropkey-tls
  rules:
  - host: dropkey.io
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: dropkey
            port:
              name: http

# ServiceMonitor (Prometheus)
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: dropkey-monitor
  namespace: dropkey
spec:
  selector:
    matchLabels:
      app: dropkey
  endpoints:
  - port: http
    path: /metrics
    interval: 30s
